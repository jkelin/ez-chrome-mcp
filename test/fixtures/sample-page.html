<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>EZ Chrome MCP Fixture</title>
  </head>
  <body>
    <h1>EZ Chrome MCP Fixture</h1>
    <script>
      globalThis.fixtureState = { count: 0 };

      globalThis.logRepeated = function logRepeated() {
        for (let i = 0; i < 3; i += 1) console.warn("fixture repeat");
        return "logged repeated warnings";
      };

      globalThis.logLevels = function logLevels() {
        console.log("fixture log");
        console.info("fixture info");
        console.error("fixture error");
        return { ok: true, count: globalThis.fixtureState.count };
      };

      globalThis.throwSync = function throwSync() {
        throw new Error("fixture sync failure");
      };

      globalThis.throwAsync = function throwAsync() {
        setTimeout(() => {
          throw new Error("fixture async failure");
        }, 10);
        return "scheduled async failure";
      };

      globalThis.incrementState = function incrementState() {
        globalThis.fixtureState.count += 1;
        console.log("fixture count", globalThis.fixtureState.count);
        return globalThis.fixtureState.count;
      };

      globalThis.promiseValue = async function promiseValue() {
        await new Promise((resolve) => setTimeout(resolve, 20));
        console.log("fixture promise resolved");
        return { async: true };
      };

      globalThis.fetchJsonApi = async function fetchJsonApi() {
        const payload = { client: "fetch", value: 7 };
        const response = await fetch("/api/echo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const body = await response.json();
        console.log("fetch json done", body.received?.client);
        return body;
      };

      globalThis.xhrJsonApi = function xhrJsonApi() {
        return new Promise((resolve, reject) => {
          const payload = { client: "xhr", value: 9 };
          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/api/echo");
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.onload = () => {
            console.log("xhr json done");
            resolve(JSON.parse(xhr.responseText));
          };
          xhr.onerror = () => reject(new Error("xhr failed"));
          xhr.send(JSON.stringify(payload));
        });
      };

      globalThis.fetchBinaryApi = async function fetchBinaryApi() {
        const response = await fetch("/api/binary");
        console.log("fetch binary", response.headers.get("content-type"));
        return {
          status: response.status,
          type: response.headers.get("content-type"),
        };
      };

      globalThis.fetchLargeJsonApi = async function fetchLargeJsonApi() {
        const response = await fetch("/api/large-json");
        const body = await response.json();
        console.log("fetch large json", body.message);
        return body;
      };

      globalThis.navigateSpa = function navigateSpa() {
        history.pushState({}, "", "/sample-page.html#spa");
        console.log("spa navigated");
        return location.href;
      };
    </script>
  </body>
</html>
